name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    env:
      # This flag forces the runner to use Node 24 and removes the warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4 # Updated to v4 for Node 24 support
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # Added caching to make builds faster

      - name: Grant Gradle Executable
        run: chmod +x ./gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.keystore_base64 }}" | base64 --decode > app/release-key.jks

      - name: Clean Project
        run: ./gradlew clean

      - name: Build Release APK
        # Ensure your build.gradle is pointing to app/release-key.jks
        run: ./gradlew assembleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4 # v4 is fine but now runs on Node 24
        with:
          name: DailyHubKE-release-apk
          path: app/build/outputs/apk/release/app-release.apk
