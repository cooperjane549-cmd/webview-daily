name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    
    # We place it here to ensure the Job Runner sees it immediately
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # This ensures we use the latest version of the action code
          persist-credentials: false

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Gradle Executable
        run: chmod +x ./gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.keystore_base64 }}" | base64 --decode > app/release-key.jks

      - name: Clean Project
        run: ./gradlew clean

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: DailyHubKE-release-apk
          path: app/build/outputs/apk/release/app-release.apk
